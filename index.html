<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Britton Dev Studio</title>

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Outfit',sans-serif;
    background:#020617;
    color:#fff;
    overflow-x:hidden;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 8%;
    position:fixed;
    width:100%;
    z-index:100;
    background:rgba(2,6,23,0.6);
    backdrop-filter:blur(20px);
}
nav h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    background:linear-gradient(90deg,#a78bfa,#6366f1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
nav button{
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* Animated Gradient Orbs */
.hero::before, .hero::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#8b5cf6,transparent);
    filter:blur(120px);
    animation:float 10s infinite alternate;
}
.hero::before{top:-100px;left:-100px}
.hero::after{bottom:-100px;right:-100px}

@keyframes float{
    0%{transform:translateY(0px)}
    100%{transform:translateY(50px)}
}

/* Grid overlay */
.grid-bg{
    position:absolute;
    width:100%;
    height:100%;
    background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);
    background-size:40px 40px;
    z-index:0;
}

.hero h2{
    font-family:'Space Grotesk',sans-serif;
    font-size:3.5rem;
    z-index:2;
}

.hero span{
    background:linear-gradient(90deg,#a78bfa,#6366f1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:#000;
    color:#fff;
    font-weight:600;
    z-index:2;
    transition:.3s;
}
.hero button:hover{
    transform:scale(1.05);
    background:#111;
}

/* Glow effect behind text */
.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#6366f1;
    filter:blur(150px);
    opacity:0.4;
    z-index:1;
}

/* MOBILE */
@media(max-width:768px){
.hero h2{font-size:2rem}
}
</style>
</head>

<body>

<nav>
<h1>Britton Dev Studio</h1>
<button>Get Quote</button>
</nav>

<div class="hero">

<div class="grid-bg"></div>
<div class="glow"></div>

<h2>I build <span id="typed"></span></h2>
<button>Start Project</button>

</div>

<script>
AOS.init();

new Typed("#typed",{
strings:[
"business solutions",
"scalable web apps",
"AI-powered tools",
"next-level digital experiences"
],
typeSpeed:50,
backSpeed:30,
loop:true
});
</script>

</body>
</html>
